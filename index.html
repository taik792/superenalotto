<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Motore SuperEnalotto</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .ball {
            display: inline-block;
            width: 45px; height: 45px;
            line-height: 45px;
            text-align: center;
            border-radius: 50%;
            background: #22c55e; /* Verde standard */
            color: white; font-weight: bold;
            margin: 5px;
        }
        .superstar {
            background: #e11d48 !important; /* Rosso per Superstar */
            border: 2px solid #881337;
        }
        #container { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Analisi Statistica SuperEnalotto</h1>
    <div id="ultimo-concorso">Caricamento estrazione recente...</div>
    <div id="container">
        <h3>Sestina Generata (4 Frequenti + 2 Ritardatari):</h3>
        <div id="sestina-generata"></div>
    </div>

    <script>
    fetch('estrazioni.json')
        .then(res => res.json())
        .then(data => {
            // Ordiniamo dal più recente al più vecchio (il contrario di prima)
            data.sort((a, b) => b.concorso - a.concorso);
            
            // 1. Mostriamo l'ultimo (che ora è il primo dell'elenco)
            let ultima = data[0]; 
            let boxUltima = document.getElementById('ultimo-concorso');
            if(boxUltima) {
                boxUltima.innerHTML = `<strong>Ultimo Concorso (${ultima.concorso}):</strong> ${ultima.numeri.join(', ')}`;
            }

            // 2. Analisi Statistica
            let frequenze = {};
            let ultimaPresenza = {};
            data.forEach((c, index) => {
                c.numeri.forEach(num => {
                    frequenze[num] = (frequenze[num] || 0) + 1;
                    if (!(num in ultimaPresenza)) ultimaPresenza[num] = c.concorso;
                });
            });

            let sortedFreq = Object.keys(frequenze).sort((a, b) => frequenze[b] - frequenze[a]);
            let quattroFrequenti = sortedFreq.slice(0, 4).map(Number);
            let sortedRitardatari = Object.keys(frequenze).sort((a, b) => ultimaPresenza[a] - ultimaPresenza[b]);
            let dueRitardatari = sortedRitardatari.slice(0, 2).map(Number);

            let sestina = [...new Set([...quattroFrequenti, ...dueRitardatari])].sort((a, b) => a - b);

            // 3. Inserimento nel DOM senza distruggere i tuoi box di inserimento
            let boxSestina = document.getElementById('sestina-generata');
            if(boxSestina) {
                boxSestina.innerHTML = sestina.map(n => `<span class="ball">${n}</span>`).join('');
            }
        });
</script>
</body>
</html>
