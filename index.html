<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SuperEnalotto Analytics 2026</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 20px; }
        h1 { color: #22c55e; text-align: center; }
        .ball { display: inline-block; width: 40px; height: 40px; border-radius: 50%; background: #22c55e; color: white; text-align: center; line-height: 40px; font-weight: bold; margin: 5px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 150px; }
        button { padding: 10px 20px; background: #22c55e; color: white; border: none; border-radius: 5px; cursor: pointer; }
        pre { background: #000; color: #22c55e; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="card">
    <h1>SuperEnalotto Analytics 2026</h1>
    
    <h3>➕ Inserimento Nuovi Dati</h3>
    <input type="number" id="in-n" placeholder="N. Concorso">
    <input type="text" id="in-num" placeholder="Numeri (es: 6,9,17,20,60,67)">
    <input type="number" id="in-j" placeholder="Jolly">
    <input type="number" id="in-ss" placeholder="SuperStar">
    <button onclick="generaJSON()">Genera JSON</button>
    <pre id="output-json">...attendendo input...</pre>
</div>

<div class="card">
    <h3>Ultimo Concorso Disponibile</h3>
    <div id="last-data">Caricamento in corso...</div>
</div>

<div class="card" style="border: 2px solid #22c55e;">
    <h3>Sestina Calcolata (Motore Real-Time)</h3>
    <div id="sestina-generata">
        <span class="ball">5</span><span class="ball">12</span><span class="ball">14</span>
        <span class="ball">32</span><span class="ball">36</span><span class="ball">78</span>
    </div>
</div>

<script>
    fetch('estrazioni.json')
        .then(res => res.json())
        .then(data => {
            // 1. Ordine cronologico
            data.sort((a, b) => a.concorso - b.concorso);
            
            // 2. Analisi: Conta presenze e segna l'ultima posizione (ritardo)
            let frequenze = {};
            let ultimaPresenza = {};

            data.forEach((c, index) => {
                c.numeri.forEach(num => {
                    frequenze[num] = (frequenze[num] || 0) + 1;
                    ultimaPresenza[num] = index; 
                });
            });

            // 3. I 4 più frequenti
            let sortedFreq = Object.keys(frequenze).sort((a, b) => frequenze[b] - frequenze[a]);
            let quattroFrequenti = sortedFreq.slice(0, 4).map(Number);

            // 4. I 2 più ritardatari (indice più basso = assente da più tempo)
            let sortedRitardatari = Object.keys(frequenze).sort((a, b) => ultimaPresenza[a] - ultimaPresenza[b]);
            let dueRitardatari = sortedRitardatari.slice(0, 2).map(Number);

            // 5. Unione e pulizia doppioni
            let setSestina = new Set([...quattroFrequenti, ...dueRitardatari]);
            let sestina = Array.from(setSestina).sort((a, b) => a - b);

            // Se mancano numeri, riempi casualmente
            while(sestina.length < 6) {
                let r = Math.floor(Math.random() * 90) + 1;
                if(!sestina.includes(r)) sestina.push(r);
            }
            sestina = sestina.slice(0, 6).sort((a, b) => a - b);

            // 6. SuperStar CASUALE (come volevi tu)
            let superStar = Math.floor(Math.random() * 90) + 1;

            // 7. Visualizzazione
            document.getElementById('sestina-generata').innerHTML = `
                <div class="sestina-container">
                    ${sestina.map(n => `<span class="ball">${n}</span>`).join('')}
                    <span class="ball superstar">${superStar}</span>
                </div>
            `;
            
            console.log("Motore statistico attivo (4 Frequenti + 2 Ritardatari + SS Casuale)");
        })
        .catch(err => console.error("Errore motore:", err));
</script>
</body>
</html>
