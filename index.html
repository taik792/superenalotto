<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SuperEnalotto Analytics</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .admin-panel { border: 2px dashed #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .result-box { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SuperEnalotto Analytics</h1>

    <div class="admin-panel">
        <h3>Pannello Inserimento Nuovi Dati</h3>
        <input type="number" id="in-n" placeholder="N. Concorso">
        <input type="text" id="in-num" placeholder="Numeri (es: 5,12,14,32,36,78)">
        <input type="number" id="in-ss" placeholder="SuperStar">
        <button onclick="generaJSON()">Genera Codice JSON</button>
        <p id="output-json" style="font-family: monospace;"></p>
    </div>

    <div id="analytics-area">
        <h3>Ultimo Concorso Disponibile</h3>
        <div id="last-data" class="result-box">...caricamento...</div>
    </div>
</div>

<script>
    // Caricamento dati e visualizzazione
    fetch('estrazioni.json')
        .then(res => res.json())
        .then(data => {
            const last = data[data.length - 1];
            document.getElementById('last-data').innerHTML = `
                Concorso n. ${last.concorso} (${last.anno})<br>
                Numeri: ${last.numeri.join(", ")}<br>
                SuperStar: ${last.superstar}
            `;
            // QUI PUOI AGGIUNGERE LA TUA LOGICA DI CALCOLO ORIGINALE
            // es: calcolaNumeriCaldi(data);
        });

    // Funzione per il pannello inserimento
    function generaJSON() {
        const newObj = {
            "concorso": parseInt(document.getElementById('in-n').value),
            "anno": 2024,
            "numeri": document.getElementById('in-num').value.split(',').map(n => parseInt(n.trim())),
            "superstar": parseInt(document.getElementById('in-ss').value)
        };
        document.getElementById('output-json').innerText = JSON.stringify(newObj) + ",";
    }
</script>

</body>
</html>
