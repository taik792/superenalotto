<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Motore SuperEnalotto</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .ball {
            display: inline-block;
            width: 45px; height: 45px;
            line-height: 45px;
            text-align: center;
            border-radius: 50%;
            background: #22c55e; /* Verde standard */
            color: white; font-weight: bold;
            margin: 5px;
        }
        .superstar {
            background: #e11d48 !important; /* Rosso per Superstar */
            border: 2px solid #881337;
        }
        #container { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Analisi Statistica SuperEnalotto</h1>
    <div id="ultimo-concorso">Caricamento estrazione recente...</div>
    <div id="container">
        <h3>Sestina Generata (4 Frequenti + 2 Ritardatari):</h3>
        <div id="sestina-generata"></div>
    </div>

    <script>
        fetch('estrazioni.json')
            .then(res => res.json())
            .then(data => {
                // 1. Ordine cronologico
                data.sort((a, b) => a.concorso - b.concorso);
                
                // 2. Mostra l'ultima estrazione reale
                let ultima = data[data.length - 1];
                document.getElementById('ultimo-concorso').innerHTML = 
                    `<strong>Ultimo Concorso (${ultima.concorso}):</strong> ${ultima.numeri.join(', ')} | SS: ${ultima.superstar}`;

                // 3. Analisi Statistica
                let frequenze = {};
                let ultimaPresenza = {};

                data.forEach((c, index) => {
                    c.numeri.forEach(num => {
                        frequenze[num] = (frequenze[num] || 0) + 1;
                        ultimaPresenza[num] = index;
                    });
                });

                // A) 4 Numeri più frequenti
                let sortedFreq = Object.keys(frequenze).sort((a, b) => frequenze[b] - frequenze[a]);
                let quattroFrequenti = sortedFreq.slice(0, 4).map(Number);

                // B) 2 Numeri più ritardatari (che mancano da più tempo)
                let sortedRitardatari = Object.keys(frequenze).sort((a, b) => ultimaPresenza[a] - ultimaPresenza[b]);
                let dueRitardatari = sortedRitardatari.slice(0, 2).map(Number);

                // C) Unione e rimozione duplicati
                let sestina = [...new Set([...quattroFrequenti, ...dueRitardatari])].sort((a, b) => a - b);
                
                // Se mancano numeri (per sicurezza), aggiungiamo casuali
                while(sestina.length < 6) {
                    let r = Math.floor(Math.random() * 90) + 1;
                    if(!sestina.includes(r)) sestina.push(r);
                }
                sestina = sestina.slice(0, 6).sort((a, b) => a - b);

                // D) SuperStar Casuale
                let superStar = Math.floor(Math.random() * 90) + 1;

                // 4. Stampa a video
                document.getElementById('sestina-generata').innerHTML = 
                    sestina.map(n => `<span class="ball">${n}</span>`).join('') +
                    `<span class="ball superstar">${superStar}</span>`;
            })
            .catch(err => {
                document.getElementById('ultimo-concorso').innerHTML = "Errore: File estrazioni.json non trovato o corrotto.";
                console.error(err);
            });
    </script>
</body>
</html>
